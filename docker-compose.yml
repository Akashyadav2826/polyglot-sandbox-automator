version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: containers/api/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./temp:/app/temp
    depends_on:
      - redis
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"